services:
  - type: web
    name: omdb-ai-agent
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: "*"
      - key: GROQ_API_KEY
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: AGENT_AUTH_TOKEN
        sync: false
